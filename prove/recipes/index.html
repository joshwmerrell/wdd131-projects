<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <!-- I have decided not to use javascript here for it is not needed. -->
    <!-- <script src="script.js defer"></script> -->
    <title>Recipe Book</title>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <!-- <meta property="og:type" content="website">

    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png"> -->
    <!-- X Card -->
    <!-- <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png"> -->

</head>
<body>
    <div id="content">

        <header>
            <a id="logo-title" href="#" aria-label="Recipe Book Page Logo">
                <img src="images/recipe-book.png" aria-hidden="true">
                <h1 aria-hidden="true">RecipeBook</h1>
            </a>
            <div id="search-bar">
                <input type="text" placeholder="Find a recipe" aria-label="Search Box" />
                <hr>
                <a aria-label="Search Button">
                    <img src="images/search.svg" aria-hidden="true">
                </a>
            </div>
        </header>

        <hr class="header-main-separator" aria-hidden="true">

        <main>
            <section id="recipes">
                <!-- This is the template for the leteral template to come in javascript -->
                <article class="recipe-card">
                    <img src="images/apple-crisp.jpg">
                    <div class="recipe-content">
                        <span
                            class="food-catagories"
                        >
                            <button>dessert</button>
                            <button>fruit</button>
                        </span>
                        <h2>Apple Crisp</h2>
                        <span
                            class="recipe-rating"
                            role="img"
                            aria-label="Rating: 4 out of 5 stars"
                        >
                            <span aria-hidden="true" class="icon-star">⭐</span>
                            <span aria-hidden="true" class="icon-star">⭐</span>
                            <span aria-hidden="true" class="icon-star">⭐</span>
                            <span aria-hidden="true" class="icon-star">⭐</span>
                            <span aria-hidden="true" class="icon-star-empty">☆</span>
                        </span>
                        <p class="description" aria-hidden="true">The apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
                    </div>
                </article>
            </section>
        </main>

        <footer>
            <div id="social-media-icons">
                <a><img src="images/instagram_icon.svg" alt="Instagram Link"></a>
                <a><img src="images/youtube_icon.svg" alt="YouTube Link"></a>
                <a><img src="images/pinterest_icon.svg" alt="Pinterest Link"></a>
            </div>
            <a class="text-link" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
            <a class="text-link" href="../../index.html">HOME PAGE</a>
        </footer>

    </div>
</body>
</html>
