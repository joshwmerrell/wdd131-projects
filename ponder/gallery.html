<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Merrell, Joshua">
    <meta name="description" content="The Gallery with Modals assignment for Week 4 Ponder.">
    <link href="gallery.css" rel="stylesheet">
    <script src="gallery.js" defer></script>
    <title>Document</title>
</head>
<body>

    <header>
        <h1>Gallery</h1>
    </header>

    <main>
        <section class="gallery">
            <figure>  
                <img src="gallery-images/book-sm.jpg" alt="person reading a book">
            </figure>
            <figure>  
                <img src="gallery-images/couch-sm.jpg" alt="person sitting on a couch with a phone">
            </figure>
            <figure>  
                <img src="gallery-images/desk-sm.jpg" alt="a work desktop">
            </figure>
            <figure>  
                <img src="gallery-images/keyboard-sm.jpg" alt="person typing on a keyboard">
            </figure>
            <figure>  
                <img src="gallery-images/phone-sm.jpg" alt="person looking at a phone">
            </figure>
            <figure>  
                <img src="gallery-images/sit-sm.jpg" alt="person sitting on a couch">
            </figure>
        </section>
        <dialog>
            <img>
            <button class="close-viewer">X</button>
        </dialog>     
    </main>

    <footer>
    </footer>

</body>
</html>
